name = "connections-cache"
main = "src/index.js"
compatibility_date = "2026-06-24"
workers_dev = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true
head_sampling_rate = 1

[triggers]
crons = ["0 */6 * * *"]

[[kv_namespaces]]
binding = "GAMES_CACHE"
id = "47131485ddf648b9b6b3d9b74eacfb60"

[[durable_objects.bindings]]
name = "SEARCH_JOBS"
class_name = "SearchJobObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SearchJobObject"]
