name: Deploy Pages

# Publishes the static site in /site to GitHub Pages.
# Triggers whenever data changes (after compute-chains commits) or when
# the site source itself changes.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy data into site (so it's served at /data/*.json)
        run: |
          mkdir -p site/data
          cp -v data/chains.json site/data/ 2>/dev/null || true
          cp -v data/players.json site/data/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
